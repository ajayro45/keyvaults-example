name: Deploy Bicep to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Step 2: Login to Azure
    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

    # Step 3: Install Azure CLI and Bicep
    - name: Install Azure CLI and Bicep
      run: |
        curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
        az bicep install

    # Step 4: Validate Subscription and Resource Group
    - name: Validate Subscription and Resource Group
      run: |
        SUBSCRIPTION_NAME=$(az account show --query name -o tsv)
        RESOURCE_GROUP_EXISTS=$(az group exists --name rg-${{ secrets.ENV }})

        echo "Current Subscription: $SUBSCRIPTION_NAME"
        if [[ "$SUBSCRIPTION_NAME" != "Expected Subscription Name" ]]; then
          echo "Error: Deployment is targeting the wrong subscription."
          exit 1
        fi

        if [[ "$RESOURCE_GROUP_EXISTS" != "true" ]]; then
          echo "Error: Resource group rg-${{ secrets.ENV }} does not exist."
          exit 1
        fi

    # Step 5: Deploy Bicep file
    - name: Deploy Bicep
      run: |
        az deployment sub create \
          --template-file ./path/to/your/bicep/file.bicep \
          --parameters env=${{ secrets.ENV }} \
                      location=${{ secrets.LOCATION }} \
                      dc_subnet=${{ secrets.DC_SUBNET }} \
                      adminGroupId=${{ secrets.ADMIN_GROUP_ID }} \
                      devGroupId=${{ secrets.DEV_GROUP_ID }}