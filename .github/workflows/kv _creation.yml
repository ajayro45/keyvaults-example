name: Keyvault Creation 

on:
  workflow_dispatch:
    inputs:
      subscription_id:
        description: "Azure subscription ID"
        required: true
      keyvault_names:
        description: "Comma-separated list of Key Vault names"
        required: true
      role_assignments:
        description: "JSON array of role assignments (roleDefinitionId, principalId, principalType)"
        required: false
      subnet_id:
        description: "Subnet ID for Virtual Network rules"
        required: false

jobs:
  create-keyvaults:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set Azure Subscription
      run: |
        az account set --subscription "${{ inputs.subscription_id }}"

    - name: Create Key Vaults
      run: |
        IFS=',' read -ra KV_NAMES <<< "${{ inputs.keyvault_names }}"
        for kv_name in "${KV_NAMES[@]}"; do
          az keyvault create --name "$kv_name" --resource-group "YourResourceGroup" --location "YourLocation"
        done

    - name: Assign Roles to Key Vaults
      run: |
        IFS=',' read -ra KV_NAMES <<< "${{ inputs.keyvault_names }}"
        ROLE_ASSIGNMENTS=${{ inputs.role_assignments }}
        for kv_name in "${KV_NAMES[@]}"; do
          for role in $(echo $ROLE_ASSIGNMENTS | jq -c '.[]'); do
            ROLE_DEFINITION_ID=$(echo $role | jq -r '.roleDefinitionId')
            PRINCIPAL_ID=$(echo $role | jq -r '.principalId')
            PRINCIPAL_TYPE=$(echo $role | jq -r '.principalType')
            az role assignment create --role "$ROLE_DEFINITION_ID" \
              --assignee "$PRINCIPAL_ID" \
              --scope "/subscriptions/${{ inputs.subscription_id }}/resourceGroups/YourResourceGroup/providers/Microsoft.KeyVault/vaults/$kv_name"
          done
        done

    - name: Configure Network ACLs
      run: |
        IFS=',' read -ra KV_NAMES <<< "${{ inputs.keyvault_names }}"
        for kv_name in "${KV_NAMES[@]}"; do
          az keyvault network-rule add --name "$kv_name" --resource-group "YourResourceGroup" \
            --vnet-name "YourVirtualNetworkName" --subnet "${{ inputs.subnet_id }}"
        done
